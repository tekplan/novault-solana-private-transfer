kind = "web"
previewPath = "/"
title = "Novault — Private Transfer Agent"
version = "1.0.0"
id = "artifacts/novault"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24010

[services.development]
run = "pnpm --filter @workspace/novault run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/novault", "run", "build" ]
publicDir = "artifacts/novault/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24010"
BASE_PATH = "/"
